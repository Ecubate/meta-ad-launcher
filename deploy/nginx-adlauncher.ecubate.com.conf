# /etc/nginx/sites-available/adlauncher  (symlink into sites-enabled/)
# Then: sudo nginx -t && sudo systemctl reload nginx && sudo certbot --nginx -d adlauncher.ecubate.com
# Certbot adds the TLS/443 block automatically.
server {
    listen 80;
    server_name adlauncher.ecubate.com;

    location / {
        proxy_pass http://localhost:3010;              # must match PORT in server/.env
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;    # lets the app mark cookies Secure
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}
